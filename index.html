<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
  <meta name="description" content="DraftForgeAI — Editor literário no navegador">
  <title>DraftForgeAI</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&family=Newsreader:ital,wght@0,400;1,400&family=EB+Garamond:ital,wght@0,400;1,400&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- App styles -->
  <link rel="stylesheet" href="css/app.css">

  <!-- Restaura tema salvo antes do render para evitar flash -->
  <script>(function(){var t=localStorage.getItem('df_theme');if(t==='dark')document.documentElement.setAttribute('data-theme','dark');}());</script>

  <!-- Corrige 100vh no Safari iOS/iPadOS: sem isso, o teclado virtual empurra
       o cabeçalho pra fora da tela ao digitar (layout viewport não encolhe). -->
  <script>(function(){
    function setVh() {
      var h = (window.visualViewport && window.visualViewport.height) || window.innerHeight;
      document.documentElement.style.setProperty('--vh', h + 'px');
    }
    setVh();
    window.addEventListener('resize', setVh);
    if (window.visualViewport) window.visualViewport.addEventListener('resize', setVh);
  }());</script>

  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" onload="gisLoaded()" async defer></script>
</head>
<body>

<!-- ══════════════════════════════════════
     TELA DE LOGIN
══════════════════════════════════════ -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-brand">✨ DraftForgeAI</div>
    <p class="login-tagline">Acesse seus projetos do Google Drive<br>em qualquer dispositivo</p>
    <button id="btn-login" class="btn-primary">Entrar com Google</button>
  </div>
</div>

<!-- ══════════════════════════════════════
     APP PRINCIPAL
══════════════════════════════════════ -->
<div id="app" class="hidden">

  <!-- HEADER -->
  <header class="app-header">
    <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Menu">☰</button>
    <div class="header-brand">✨ DraftForgeAI</div>
    <div class="header-center" id="header-project-name"></div>
    <div class="header-right">
      <span class="save-indicator" id="save-indicator"></span>
      <span id="header-words"></span>
      <button class="btn-subtle hidden" id="btn-save-now" title="Salvar (⌘S)">Salvar</button>
      <button class="btn-subtle hidden" id="btn-close-project" title="Fechar projeto">Fechar</button>
      <button class="btn-subtle hidden" id="btn-find" title="Buscar no livro (⌘F)">
        <svg class="btn-svg-icon" viewBox="0 0 512 512" width="13" height="13" fill="currentColor" aria-hidden="true"><path d="M500.3 443.7l-119.7-119.7c27.22-40.41 40.65-90.9 33.4-144.7C401.8 87.79 326.8 13.32 235.2 1.723C99.01-15.51-15.51 99.01 1.724 235.2c11.6 91.64 86.08 166.7 177.6 178.9c53.8 7.25 104.3-6.18 144.7-33.4l119.7 119.7c15.62 15.62 40.95 15.62 56.57 0C515.9 484.7 515.9 459.3 500.3 443.7zM79.1 208c0-70.58 57.42-128 128-128s128 57.42 128 128c0 70.58-57.42 128-128 128S79.1 278.6 79.1 208z"/></svg>
        <span class="btn-label">Buscar</span>
      </button>
      <button class="btn-subtle hidden" id="btn-review" title="Modo revisão — original à esquerda, edição à direita (⌘⇧R)">
        <svg class="btn-svg-icon" viewBox="0 0 512 512" width="14" height="14" fill="currentColor" aria-hidden="true"><rect x="16" y="96" width="200" height="320" rx="24"/><rect x="296" y="96" width="200" height="320" rx="24"/><rect x="246" y="80" width="20" height="352" rx="10"/></svg>
        <span class="btn-label">Revisão</span>
      </button>
      <span id="review-controls" class="hidden">
        <button class="btn-subtle" id="review-orient" title="Alternar lado a lado / empilhado">
          <svg class="btn-svg-icon" viewBox="0 0 512 512" width="12" height="12" fill="currentColor" aria-hidden="true"><rect x="32" y="64" width="200" height="384" rx="16"/><rect x="280" y="64" width="200" height="384" rx="16"/></svg>
          <span class="btn-label">Lado a lado</span>
        </button>
        <button class="btn-subtle" id="review-resync" title="Atualizar a referência (esquerda) para o texto atual">
          <svg class="btn-svg-icon" viewBox="0 0 512 512" width="13" height="13" fill="currentColor" aria-hidden="true"><path d="M463.5 224H472c13.3 0 24-10.7 24-24V72c0-9.7-5.8-18.5-14.8-22.2s-19.3-1.7-26.2 5.2L413.4 96.6c-87.6-86.5-228.7-86.2-315.8 1c-87.5 87.5-87.5 229.3 0 316.8s229.3 87.5 316.8 0c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0c-62.5 62.5-163.8 62.5-226.3 0s-62.5-163.8 0-226.3c62.2-62.2 162.7-62.5 225.3-1L327 183c-6.9 6.9-8.9 17.2-5.2 26.2s12.5 14.8 22.2 14.8H463.5z"/></svg>
          <span class="btn-label">Referência</span>
        </button>
        <button class="btn-subtle" id="review-archive" title="Arquivar esta revisão — guarda o antes/depois deste capítulo">
          <svg class="btn-svg-icon" viewBox="0 0 512 512" width="13" height="13" fill="currentColor" aria-hidden="true"><path d="M32 96c0-17.7 14.3-32 32-32H448c17.7 0 32 14.3 32 32v32H32V96zM32 160H480V416c0 17.7-14.3 32-32 32H64c-17.7 0-32-14.3-32-32V160zM192 256c0 8.8 7.2 16 16 16h96c8.8 0 16-7.2 16-16s-7.2-16-16-16H208c-8.8 0-16 7.2-16 16z"/></svg>
          <span class="btn-label">Arquivar</span>
        </button>
        <button class="btn-subtle" id="review-history-btn" title="Revisões arquivadas deste capítulo">Revisões (0)</button>
      </span>
      <button class="btn-subtle hidden" id="btn-focus" title="Modo foco (⌘⇧F)">
        <svg class="btn-svg-icon" viewBox="0 -960 960 960" width="14" height="14" fill="currentColor" aria-hidden="true"><path d="M200-120q-33 0-56.5-23.5T120-200v-120q0-17 11.5-28.5T160-360q17 0 28.5 11.5T200-320v120h120q17 0 28.5 11.5T360-160q0 17-11.5 28.5T320-120H200Zm560 0H640q-17 0-28.5-11.5T600-160q0-17 11.5-28.5T640-200h120v-120q0-17 11.5-28.5T800-360q17 0 28.5 11.5T840-320v120q0 33-23.5 56.5T760-120ZM120-640v-120q0-33 23.5-56.5T200-840h120q17 0 28.5 11.5T360-800q0 17-11.5 28.5T320-760H200v120q0 17-11.5 28.5T160-600q-17 0-28.5-11.5T120-640Zm640 0v-120H640q-17 0-28.5-11.5T600-800q0-17 11.5-28.5T640-840h120q33 0 56.5 23.5T840-760v120q0 17-11.5 28.5T800-600q-17 0-28.5-11.5T760-640ZM338.5-338.5Q280-397 280-480t58.5-141.5Q397-680 480-680t141.5 58.5Q680-563 680-480t-58.5 141.5Q563-280 480-280t-141.5-58.5ZM565-395q35-35 35-85t-35-85q-35-35-85-35t-85 35q-35 35-35 85t35 85q35 35 85 35t85-35Zm-85-85Z"/></svg>
        <span class="btn-label">Foco</span>
      </button>
      <button class="btn-subtle" id="btn-theme" title="Alternar tema">🌙</button>
      <button class="btn-subtle" id="btn-logout">Sair</button>
      <div class="user-badge" id="user-initial">?</div>
    </div>
  </header>

  <!-- BODY (3 colunas) -->
  <div class="app-body">

    <!-- ── SIDEBAR ── -->
    <aside class="sidebar" id="sidebar">

      <!-- Estado 1: lista de projetos -->
      <div id="sidebar-projects">
        <div class="sidebar-section-header">
          <span class="sidebar-section-label">Projetos</span>
          <button class="btn-icon" id="btn-new-project" title="Novo projeto">+</button>
        </div>
        <div id="project-list"></div>
      </div>

      <!-- Estado 2: cenas do projeto ativo -->
      <div id="sidebar-scenes" class="hidden">
        <div class="sidebar-back-btn">
          <button class="btn-back" id="btn-back-projects">← Projetos</button>
        </div>
        <div class="sidebar-project-title" id="sidebar-project-title"></div>
        <div class="sidebar-new-scene">
          <button class="btn-link" id="btn-new-scene">+ Nova cena</button>
        </div>
        <div id="scene-list"></div>
      </div>

    </aside>

    <!-- ── EDITOR ── -->
    <main class="editor-area">

      <!-- Estado vazio -->
      <div id="empty-state">Selecione um projeto para começar</div>

      <!-- Editor de cena -->
      <div id="scene-editor" class="hidden">
        <div class="scene-header">
          <div class="scene-act-label act-1-color" id="scene-act-label">ATO 1</div>
          <h1 class="scene-title-h1" id="scene-title"></h1>
          <p class="scene-subtitle-p" id="scene-subtitle"></p>
        </div>

        <!-- Barra de ferramentas: fonte + zoom da página -->
        <div class="editor-toolbar" id="editor-toolbar">
          <div class="toolbar-icon-ctrl" title="Fonte padrão de escrita">
            <svg width="13" height="11" viewBox="0 0 13 11" fill="currentColor" opacity="0.55" aria-hidden="true">
              <path d="M6.5 0 L11 11 L9 11 L8 8.2 L5 8.2 L4 11 L2 11 Z M5.6 6.5 L7.4 6.5 L6.5 3.6 Z"/>
            </svg>
            <select id="select-font" class="toolbar-select" title="Tipo de letra padrão"></select>
            <select id="select-font-size" class="toolbar-select toolbar-select-sm" title="Tamanho padrão"></select>
          </div>
          <span class="toolbar-sep"></span>
          <div class="toolbar-icon-ctrl" title="Zoom da página de escrita (a página tem tamanho fixo — o texto não reflui)">
            <svg width="13" height="11" viewBox="0 0 13 11" fill="currentColor" opacity="0.55" aria-hidden="true">
              <rect x="0" y="4.5" width="13" height="2" rx="1"/>
              <path d="M2 4.5 L0 6.5 L2 8.5" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M11 4.5 L13 6.5 L11 8.5" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <input type="range" id="slider-width" min="350" max="2100" step="20" value="700" class="toolbar-slider">
          </div>
        </div>

        <div class="editor-wrap" id="editor-wrap">
          <div id="review-ref" class="hidden" aria-label="Texto original (somente leitura)">
            <div class="review-ref-label">Original — somente leitura</div>
            <div id="review-ref-body"></div>
          </div>
          <div id="review-divider" class="hidden" title="Arraste para redimensionar"></div>
          <textarea id="editor-textarea" placeholder="Comece a escrever esta cena…" spellcheck="true"></textarea>
        </div>
        <div class="editor-footer">
          <span id="scene-word-count">0 palavras nesta cena</span>
        </div>
      </div>

    </main>

    <!-- ── NOTAS ── -->
    <aside class="notes-panel">
      <div class="notes-empty-msg" id="notes-empty">Selecione uma cena<br>para ver as notas</div>

      <div id="notes-content" class="hidden">

        <div class="notes-section">
          <label class="notes-label" for="notes-status">Status</label>
          <select id="notes-status">
            <option value="todo">Rascunho</option>
            <option value="notes">Notas apenas</option>
            <option value="done">✓ Escrita</option>
          </select>
        </div>

        <div class="notes-section">
          <label class="notes-label" for="notes-nota">Notas da cena</label>
          <textarea id="notes-nota" placeholder="Observações sobre esta cena…" rows="4"></textarea>
        </div>

        <div class="notes-section">
          <label class="notes-label" for="notes-loc">Local</label>
          <input id="notes-loc" type="text" placeholder="—">
        </div>

        <div class="notes-section">
          <label class="notes-label" for="notes-pov">Ponto de vista</label>
          <input id="notes-pov" type="text" placeholder="—">
        </div>

        <div class="notes-section">
          <label class="notes-label" for="notes-tom">Tom</label>
          <input id="notes-tom" type="text" placeholder="—">
        </div>

        <div class="notes-section">
          <label class="notes-label" for="notes-objetivo">Objetivo da cena</label>
          <textarea id="notes-objetivo" placeholder="—" rows="3"></textarea>
        </div>

        <div class="notes-section">
          <label class="notes-label" for="notes-gancho">Gancho de saída</label>
          <textarea id="notes-gancho" placeholder="—" rows="2"></textarea>
        </div>

      </div>
    </aside>

  </div><!-- /app-body -->
</div><!-- /app -->

<!-- ══════════════════════════════════════
     MODO FOCO — overlay em tela cheia
══════════════════════════════════════ -->
<div id="focus-overlay" class="hidden">
  <div id="focus-scene-title"></div>
  <textarea id="focus-editor" spellcheck="true"></textarea>
  <div id="focus-footer">
    <span id="focus-wordcount"></span>
  </div>
  <div id="focus-hint">ESC para sair do modo foco</div>
  <button id="btn-focus-find" title="Buscar no livro (⌘F)">
    <svg viewBox="0 0 512 512" width="14" height="14" fill="currentColor" aria-hidden="true"><path d="M500.3 443.7l-119.7-119.7c27.22-40.41 40.65-90.9 33.4-144.7C401.8 87.79 326.8 13.32 235.2 1.723C99.01-15.51-15.51 99.01 1.724 235.2c11.6 91.64 86.08 166.7 177.6 178.9c53.8 7.25 104.3-6.18 144.7-33.4l119.7 119.7c15.62 15.62 40.95 15.62 56.57 0C515.9 484.7 515.9 459.3 500.3 443.7zM79.1 208c0-70.58 57.42-128 128-128s128 57.42 128 128c0 70.58-57.42 128-128 128S79.1 278.6 79.1 208z"/></svg>
  </button>
  <button id="btn-exit-focus" title="Sair do modo foco (Esc)">×</button>
</div>

<!-- ══════════════════════════════════════
     BUSCA — barra flutuante (todo o livro)
══════════════════════════════════════ -->
<div id="find-bar" class="hidden">
  <span class="find-icon" aria-hidden="true">
    <svg viewBox="0 0 512 512" width="14" height="14" fill="currentColor"><path d="M500.3 443.7l-119.7-119.7c27.22-40.41 40.65-90.9 33.4-144.7C401.8 87.79 326.8 13.32 235.2 1.723C99.01-15.51-15.51 99.01 1.724 235.2c11.6 91.64 86.08 166.7 177.6 178.9c53.8 7.25 104.3-6.18 144.7-33.4l119.7 119.7c15.62 15.62 40.95 15.62 56.57 0C515.9 484.7 515.9 459.3 500.3 443.7zM79.1 208c0-70.58 57.42-128 128-128s128 57.42 128 128c0 70.58-57.42 128-128 128S79.1 278.6 79.1 208z"/></svg>
  </span>
  <input type="text" id="find-input" placeholder="Buscar palavras ou frases no livro…" autocomplete="off" spellcheck="false">
  <span id="find-count" class="find-count"></span>
  <button id="find-prev" class="find-nav-btn" title="Anterior (⇧Enter)">↑</button>
  <button id="find-next" class="find-nav-btn" title="Próxima (Enter)">↓</button>
  <button id="find-close" class="find-nav-btn" title="Fechar (Esc)">×</button>
  <div id="find-results" class="hidden"></div>
</div>

<!-- ══════════════════════════════════════
     HISTÓRICO DE REVISÕES (modo revisão)
══════════════════════════════════════ -->
<div id="review-history" class="hidden"></div>

<!-- ══════════════════════════════════════
     MODAL — Novo projeto
══════════════════════════════════════ -->
<div class="modal hidden" id="modal-new-project">
  <div class="modal-box">
    <div class="modal-head">
      <h2>Novo projeto</h2>
      <button class="modal-close-btn" data-close-modal="modal-new-project">×</button>
    </div>
    <div class="modal-body">
      <div class="modal-field">
        <label for="new-project-title">Título *</label>
        <input id="new-project-title" type="text" placeholder="Título do projeto" autocomplete="off">
      </div>
      <div class="modal-field">
        <label for="new-project-author">Autor</label>
        <input id="new-project-author" type="text" value="Alexander" autocomplete="off">
      </div>
      <div class="modal-field">
        <label for="new-project-publisher">Editora</label>
        <input id="new-project-publisher" type="text" value="Lobo Publishers" autocomplete="off">
      </div>
      <div class="modal-field">
        <label for="new-project-desc">Descrição <span style="color:var(--muted)">(opcional)</span></label>
        <input id="new-project-desc" type="text" placeholder="Uma breve descrição…" autocomplete="off">
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-secondary" data-close-modal="modal-new-project">Cancelar</button>
      <button class="btn-primary" id="btn-create-project">Criar projeto →</button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════
     MODAL — Nova cena
══════════════════════════════════════ -->
<div class="modal hidden" id="modal-new-scene">
  <div class="modal-box">
    <div class="modal-head">
      <h2>Nova cena</h2>
      <button class="modal-close-btn" data-close-modal="modal-new-scene">×</button>
    </div>
    <div class="modal-body">
      <div class="modal-field">
        <label for="new-scene-title">Título *</label>
        <input id="new-scene-title" type="text" placeholder="Título da cena" autocomplete="off">
      </div>
      <div class="modal-field">
        <label for="new-scene-act">Ato</label>
        <select id="new-scene-act">
          <option value="1">Ato 1 — Construção</option>
          <option value="2">Ato 2 — Confronto</option>
          <option value="3">Ato 3 — Resolução</option>
        </select>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-secondary" data-close-modal="modal-new-scene">Cancelar</button>
      <button class="btn-primary" id="btn-create-scene">Criar cena →</button>
    </div>
  </div>
</div>

<!-- Scripts -->
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/gdrive.js"></script>
<script src="js/app.js"></script>

<!-- Sidebar toggle para mobile -->
<script>
  const toggleBtn = document.getElementById('sidebar-toggle');
  const sidebar   = document.getElementById('sidebar');
  toggleBtn?.addEventListener('click', () => sidebar.classList.toggle('open'));
  document.addEventListener('click', e => {
    if (window.innerWidth <= 680 &&
        sidebar.classList.contains('open') &&
        !sidebar.contains(e.target) &&
        e.target !== toggleBtn) {
      sidebar.classList.remove('open');
    }
  });
</script>

</body>
</html>
